<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Importar Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #F4F4F5;
      --surface:        #FFFFFF;
      --surface-hover:  #F9F9FA;
      --border:         #E4E4E7;
      --border-subtle:  #EFEFEF;
      --text:           #18181B;
      --text-secondary: #52525B;
      --text-muted:     #A1A1AA;
      --accent:         #6366F1;
      --accent-hover:   #4F46E5;
      --accent-bg:      rgba(99,102,241,.08);
      --success:        #16A34A;
      --success-bg:     rgba(22,163,74,.08);
      --error:          #DC2626;
      --error-bg:       rgba(220,38,38,.08);
      --warn:           #D97706;
      --warn-bg:        rgba(217,119,6,.08);
      --radius-sm:      6px;
      --radius:         8px;
      --radius-lg:      12px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 10;
      height: 52px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(244,244,245,.92);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-name { font-size: 14px; font-weight: 600; letter-spacing: -.015em; }
    .badge {
      font-size: 10px; font-weight: 600; letter-spacing: .06em;
      padding: 2px 7px; border-radius: 20px;
      background: var(--accent-bg); color: var(--accent-hover);
      text-transform: uppercase;
    }

    .icon-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: transparent; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .icon-btn:hover { background: var(--surface-hover); color: var(--text); border-color: #D1D1D6; }
    .icon-btn.danger:hover { background: var(--error-bg); color: var(--error); border-color: var(--error); }

    /* ── Layout ── */
    .main { display: flex; justify-content: center; padding: 32px 20px 96px; }
    .container { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 0; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 16px;
      background: transparent; border: none;
      color: var(--text-muted); font-size: 13px; font-weight: 500;
      font-family: inherit; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      display: flex; align-items: center; gap: 7px;
      transition: color 120ms;
    }
    .tab-btn:hover { color: var(--text-secondary); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-count {
      font-size: 11px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px;
      background: var(--border); color: var(--text-muted);
      min-width: 18px; text-align: center;
    }
    .tab-btn.active .tab-count { background: var(--accent-bg); color: var(--accent-hover); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    .toolbar-path {
      flex: 1; font-size: 12px; color: var(--text-muted);
      font-family: ui-monospace, 'SF Mono', monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 6px 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .toolbar-path.missing { color: var(--warn); border-color: rgba(245,158,11,.3); background: var(--warn-bg); }

    .btn {
      height: 36px; padding: 0 14px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text-secondary);
      font-size: 13px; font-weight: 500; font-family: inherit;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .btn:hover { background: var(--surface-hover); color: var(--text); border-color: #D1D1D6; }
    .btn:disabled { opacity: .35; pointer-events: none; }

    .btn-primary {
      background: var(--accent); border-color: transparent; color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: transparent; color: #fff; }
    .btn-primary:disabled { opacity: .35; pointer-events: none; }

    .btn-sm { height: 30px; padding: 0 12px; font-size: 12px; }

    /* ── Select bar ── */
    .select-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
    }
    .select-bar label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-secondary);
      cursor: pointer; user-select: none;
    }
    .select-count { flex: 1; font-size: 12px; color: var(--text-muted); }

    /* ── Checkbox ── */
    input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }

    /* ── File list ── */
    .file-list { display: flex; flex-direction: column; gap: 2px; }

    .file-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 100ms, border-color 100ms;
    }
    .file-row:hover { background: var(--surface-hover); }
    .file-row.selected { border-color: rgba(99,102,241,.4); background: rgba(99,102,241,.05); }

    .ext-badge {
      width: 34px; height: 34px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; letter-spacing: .05em;
      flex-shrink: 0;
    }
    .ext-badge.pdf { background: rgba(220,38,38,.10); color: #DC2626; }
    .ext-badge.xls,
    .ext-badge.xlsx { background: rgba(22,163,74,.10); color: #16A34A; }

    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 13px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* ── Import action bar ── */
    .import-bar {
      position: sticky; bottom: 0; z-index: 5;
      background: rgba(244,244,245,.95); backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 0; margin-top: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .import-bar .btn-primary { flex: 1; height: 42px; font-size: 14px; justify-content: center; }

    /* ── Spinner ── */
    .spin {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }
    .spin-dark {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--text-muted); border-radius: 50%;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px;
      padding: 64px 24px;
      color: var(--text-muted); text-align: center;
    }
    .empty-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .empty-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
    .empty-sub   { font-size: 13px; max-width: 320px; }

    /* ── Result cards ── */
    .result-list { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }

    .result-card {
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      background: var(--surface); overflow: hidden;
      animation: fadeUp 200ms ease forwards;
    }
    .result-card.ok   { border-color: rgba(22,163,74,.2); }
    .result-card.err  { border-color: rgba(220,38,38,.2); }

    .result-head {
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.err { background: var(--error); }

    .result-source { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-meta   { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

    .result-files  { padding: 4px 6px 6px; display: flex; flex-direction: column; gap: 1px; }
    .result-file-link {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: var(--radius-sm);
      color: var(--text-secondary); text-decoration: none; font-size: 12px;
      transition: background 100ms, color 100ms;
    }
    .result-file-link:hover { background: var(--accent-bg); color: var(--accent-hover); }
    .result-file-link svg { flex-shrink: 0; color: var(--text-muted); }
    .result-file-link:hover svg { color: var(--accent-hover); }

    .result-error-msg { padding: 8px 14px 12px; font-size: 12px; color: var(--error); }

    /* ── Imported entries ── */
    .log-list { display: flex; flex-direction: column; gap: 6px; }

    .log-card {
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      background: var(--surface); overflow: hidden;
    }
    .log-card.ok  { border-left: 3px solid var(--success); }
    .log-card.err { border-left: 3px solid var(--error); }

    .log-head {
      padding: 10px 14px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .log-info { flex: 1; min-width: 0; }
    .log-filename {
      font-size: 13px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 2px;
    }
    .log-sub { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .log-sub span { display: flex; align-items: center; gap: 4px; }

    .log-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 1px; }

    .log-files { padding: 0 6px 6px; display: flex; flex-direction: column; gap: 1px; }
    .log-error-msg { padding: 6px 14px 10px; font-size: 12px; color: var(--error); }

    .reimport-result {
      padding: 6px 14px 10px;
      font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .reimport-result.ok  { color: var(--success); }
    .reimport-result.err { color: var(--error); }

    /* ── Input ── */
    .input {
      flex: 1; height: 36px; padding: 0 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 150ms;
    }
    .input::placeholder { color: var(--text-muted); }
    .input:focus { border-color: var(--accent); }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; opacity: 0; pointer-events: none;
      transition: opacity 180ms;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      width: 520px; max-width: calc(100vw - 32px);
      max-height: 80vh;
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transform: translateY(10px); transition: transform 180ms;
      overflow: hidden;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-size: 14px; font-weight: 600; }

    .modal-body { flex: 1; overflow-y: auto; padding: 6px; }
    .modal-body::-webkit-scrollbar { width: 5px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .modal-path {
      padding: 8px 18px; font-size: 11px; color: var(--text-muted);
      font-family: ui-monospace, 'SF Mono', monospace;
      border-bottom: 1px solid var(--border-subtle);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
    }

    .dir-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 13px; color: var(--text-secondary);
      transition: background 100ms, color 100ms;
    }
    .dir-row:hover { background: var(--surface-hover); color: var(--text); }
    .dir-row.up { color: var(--text-muted); font-style: italic; }

    .modal-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-sel-path {
      flex: 1; font-size: 11px; color: var(--text-muted);
      font-family: ui-monospace, 'SF Mono', monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Config modal fields ── */
    .cfg-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .cfg-field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .cfg-field .field-row { display: flex; gap: 8px; }

    /* ── Utilities ── */
    .hidden { display: none !important; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-left">
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1.5 3.5h11M1.5 7h7M1.5 10.5h9" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="app-name">Importar Pedidos</span>
    <span class="badge">ERP</span>
  </div>
  <button class="icon-btn" id="configBtn" title="Configurações">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M7.5 9.5a2 2 0 100-4 2 2 0 000 4z" stroke="currentColor" stroke-width="1.3"/>
      <path d="M12.2 7.5c0-.26.02-.52.06-.77l1.27-.74a.5.5 0 00.17-.68l-1.2-2.08a.5.5 0 00-.65-.18l-1.27.74a5 5 0 00-1.34-.77V1.5a.5.5 0 00-.5-.5H6.26a.5.5 0 00-.5.5v1.02a5 5 0 00-1.34.77l-1.27-.74a.5.5 0 00-.65.18L1.3 5.31a.5.5 0 00.17.68l1.27.74A5.1 5.1 0 002.8 7.5c0 .26-.02.52-.06.77l-1.27.74a.5.5 0 00-.17.68l1.2 2.08c.13.22.4.3.65.18l1.27-.74c.42.3.87.55 1.34.77v1.02c0 .28.22.5.5.5h2.44c.28 0 .5-.22.5-.5v-1.02a5 5 0 001.34-.77l1.27.74a.5.5 0 00.65-.18l1.2-2.08a.5.5 0 00-.17-.68l-1.27-.74c.04-.25.06-.51.06-.77z" stroke="currentColor" stroke-width="1.3"/>
    </svg>
  </button>
</header>

<!-- ── Main ───────────────────────────────────────────────────────── -->
<div class="main">
  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending" onclick="switchTab('pending')">
        Pendentes
        <span class="tab-count" id="pendingCount">0</span>
      </button>
      <button class="tab-btn" data-tab="imported" onclick="switchTab('imported')">
        Importados
        <span class="tab-count" id="importedCount">0</span>
      </button>
    </div>

    <!-- ── Tab: Pendentes ── -->
    <div class="tab-panel active" id="tab-pending">
      <div class="toolbar">
        <div class="toolbar-path" id="watchDirLabel">—</div>
        <button class="btn" id="refreshBtn" onclick="loadPending()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M11 6.5A4.5 4.5 0 112.5 4M2.5 1.5V4H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Atualizar
        </button>
      </div>

      <div id="pendingContent">
        <div class="empty" id="pendingEmpty">
          <div class="empty-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 4v8M10 4L7 7M10 4l3 3M3.5 14.5h13" stroke="#71717A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="empty-title">Nenhum pedido pendente</p>
          <p class="empty-sub" id="pendingEmptySub">Adicione arquivos PDF, XLS ou XLSX na pasta configurada.</p>
        </div>

        <div id="pendingList" class="hidden">
          <div class="select-bar">
            <label>
              <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
              Selecionar todos
            </label>
            <span class="select-count" id="selectCount">0 selecionado(s)</span>
          </div>
          <div class="file-list" id="fileListEl"></div>
        </div>
      </div>

      <div class="import-bar" id="importBar">
        <button class="btn btn-primary" id="importBtn" disabled onclick="doImport()">
          Importar selecionados
        </button>
      </div>

      <div id="importResults" class="hidden">
        <div class="result-list" id="importResultList"></div>
      </div>
    </div>

    <!-- ── Tab: Importados ── -->
    <div class="tab-panel" id="tab-imported">
      <div class="toolbar">
        <span style="flex:1;font-size:12px;color:var(--text-muted)">Histórico de importações</span>
        <button class="btn" onclick="loadImported()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M11 6.5A4.5 4.5 0 112.5 4M2.5 1.5V4H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Atualizar
        </button>
      </div>

      <div class="log-list" id="logList">
        <div class="empty">
          <div class="empty-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="3.5" y="3.5" width="13" height="13" rx="2" stroke="#71717A" stroke-width="1.5"/>
              <path d="M7 10h6M7 7h3M7 13h4" stroke="#71717A" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="empty-title">Nenhuma importação ainda</p>
          <p class="empty-sub">Após importar pedidos eles aparecerão aqui.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── Config Modal ────────────────────────────────────────────────── -->
<div class="overlay" id="cfgOverlay">
  <div class="modal" style="max-height:unset">
    <div class="modal-header">
      <span class="modal-title">Configurações</span>
      <button class="icon-btn" onclick="closeCfgModal()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="cfg-body">
      <div class="cfg-field">
        <label>Pasta de entrada (watch folder)</label>
        <div class="field-row">
          <input class="input" id="cfgWatchDir" type="text" placeholder="Caminho da pasta…">
          <button class="btn" onclick="openBrowse('watchDir')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M1 3.5a1 1 0 011-1h2.5l1.5 2H11a1 1 0 011 1V10a1 1 0 01-1 1H2a1 1 0 01-1-1V3.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
            Selecionar
          </button>
        </div>
      </div>
      <div class="cfg-field">
        <label>Pasta de saída (XLS do ERP)</label>
        <div class="field-row">
          <input class="input" id="cfgOutputDir" type="text" placeholder="Caminho da pasta…">
          <button class="btn" onclick="openBrowse('outputDir')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M1 3.5a1 1 0 011-1h2.5l1.5 2H11a1 1 0 011 1V10a1 1 0 01-1 1H2a1 1 0 01-1-1V3.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            </svg>
            Selecionar
          </button>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:16px">
        <button class="btn" onclick="closeCfgModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveConfig()">Salvar configurações</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Folder Browser Modal ──────────────────────────────────────── -->
<div class="overlay" id="browseOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Selecionar pasta</span>
      <button class="icon-btn" onclick="closeBrowse()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-path" id="browsePath">—</div>
    <div class="modal-body" id="browseBody">
      <div style="padding:24px;text-align:center;color:var(--text-muted)">Carregando…</div>
    </div>
    <div class="modal-footer">
      <span class="modal-sel-path" id="browseSelPath"></span>
      <button class="btn btn-sm" onclick="closeBrowse()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="confirmBrowse()">Selecionar aqui</button>
    </div>
  </div>
</div>

<script>
/* ── State ── */
let cfg = { watchDir: '', outputDir: '' };
let pendingFiles = [];
let selected = new Set();
let browseTarget = 'watchDir';
let browseCurrentPath = null;

/* ── Init ── */
async function init() {
  await loadConfig();
  loadPending();
  loadImported();
}

async function loadConfig() {
  try {
    const data = await api('/api/config');
    cfg = data;
    document.getElementById('cfgWatchDir').value = cfg.watchDir || '';
    document.getElementById('cfgOutputDir').value = cfg.outputDir || '';
    document.getElementById('watchDirLabel').textContent = cfg.watchDir || 'Pasta não configurada';
  } catch (_) {}
}

/* ── Tabs ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  if (tab === 'imported') loadImported();
}

/* ── Pending ── */
async function loadPending() {
  const btn = document.getElementById('refreshBtn');
  btn.innerHTML = '<div class="spin-dark"></div> Atualizando…';
  btn.disabled = true;
  try {
    const data = await api('/api/pending');
    pendingFiles = data.files || [];
    selected = new Set();
    renderPending(data);
    document.getElementById('pendingCount').textContent = pendingFiles.length;
  } catch (e) {
    showPendingEmpty('Erro ao carregar: ' + e.message);
  } finally {
    btn.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M11 6.5A4.5 4.5 0 112.5 4M2.5 1.5V4H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg> Atualizar`;
    btn.disabled = false;
  }
}

function renderPending(data) {
  const label = document.getElementById('watchDirLabel');
  label.textContent = data.watchDir || 'Pasta não configurada';
  label.classList.toggle('missing', !data.exists);

  const emptyEl = document.getElementById('pendingEmpty');
  const listEl  = document.getElementById('pendingList');

  if (!pendingFiles.length) {
    const sub = document.getElementById('pendingEmptySub');
    if (!data.exists) {
      sub.textContent = 'Pasta não encontrada. Configure em Configurações.';
    } else {
      sub.textContent = 'Adicione arquivos PDF, XLS ou XLSX na pasta configurada.';
    }
    emptyEl.classList.remove('hidden');
    listEl.classList.add('hidden');
    updateImportBar();
    return;
  }

  emptyEl.classList.add('hidden');
  listEl.classList.remove('hidden');
  renderFileRows();
  updateSelectAll();
  updateImportBar();
}

function renderFileRows() {
  const el = document.getElementById('fileListEl');
  el.innerHTML = pendingFiles.map(f => {
    const isSelected = selected.has(f.name);
    const extCls = f.ext === 'pdf' ? 'pdf' : 'xls';
    return `
      <div class="file-row ${isSelected ? 'selected' : ''}" onclick="toggleFile('${escJs(f.name)}')">
        <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();toggleFile('${escJs(f.name)}')">
        <div class="ext-badge ${extCls}">${f.ext.toUpperCase()}</div>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-meta">${fmtSize(f.size)} &middot; ${fmtDate(f.mtime)}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleFile(name) {
  if (selected.has(name)) selected.delete(name);
  else selected.add(name);
  renderFileRows();
  updateSelectAll();
  updateImportBar();
}

function toggleSelectAll() {
  const cb = document.getElementById('selectAll');
  if (cb.checked) pendingFiles.forEach(f => selected.add(f.name));
  else selected.clear();
  renderFileRows();
  updateImportBar();
}

function updateSelectAll() {
  const cb = document.getElementById('selectAll');
  cb.checked = pendingFiles.length > 0 && selected.size === pendingFiles.length;
  cb.indeterminate = selected.size > 0 && selected.size < pendingFiles.length;
  document.getElementById('selectCount').textContent = `${selected.size} selecionado(s)`;
}

function updateImportBar() {
  const btn = document.getElementById('importBtn');
  btn.disabled = selected.size === 0;
  btn.textContent = selected.size > 0
    ? `Importar ${selected.size} pedido${selected.size > 1 ? 's' : ''}`
    : 'Importar selecionados';
}

function showPendingEmpty(msg) {
  document.getElementById('pendingEmptySub').textContent = msg;
  document.getElementById('pendingEmpty').classList.remove('hidden');
  document.getElementById('pendingList').classList.add('hidden');
}

/* ── Import ── */
async function doImport() {
  if (!selected.size) return;
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Importando…';

  document.getElementById('importResults').classList.add('hidden');
  document.getElementById('importResultList').innerHTML = '';

  try {
    const data = await api('/api/import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: Array.from(selected) }),
    });

    renderImportResults(data);
    await loadPending();
    loadImported();
  } catch (e) {
    renderImportResults({ results: [], errors: [{ source: '—', error: e.message }] });
  } finally {
    btn.innerHTML = 'Importar selecionados';
    updateImportBar();
  }
}

function renderImportResults(data) {
  const wrap = document.getElementById('importResults');
  const list = document.getElementById('importResultList');
  wrap.classList.remove('hidden');
  let html = '';

  (data.results || []).forEach(r => {
    const links = (r.files || []).map(f => `
      <a class="result-file-link"
         href="/api/download?path=${encodeURIComponent(f.path)}"
         download="${esc(f.name)}">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 11h9M6.5 2v6M6.5 8L4.5 6M6.5 8l2-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        ${esc(f.name)}
      </a>`).join('');

    html += `
      <div class="result-card ok">
        <div class="result-head">
          <div class="status-dot ok"></div>
          <span class="result-source">${esc(r.source)}</span>
          <span class="result-meta">Pedido ${esc(r.order)}</span>
        </div>
        <div class="result-files">${links}</div>
      </div>`;
  });

  (data.errors || []).forEach(e => {
    html += `
      <div class="result-card err">
        <div class="result-head">
          <div class="status-dot err"></div>
          <span class="result-source">${esc(e.source)}</span>
        </div>
        <div class="result-error-msg">${esc(e.error)}</div>
      </div>`;
  });

  list.innerHTML = html || '<div class="result-card"><div class="result-error-msg">Nenhum resultado.</div></div>';
}

/* ── Imported ── */
async function loadImported() {
  try {
    const data = await api('/api/imported');
    renderImported(data.entries || []);
    document.getElementById('importedCount').textContent = (data.entries || []).length;
  } catch (_) {}
}

function renderImported(entries) {
  const el = document.getElementById('logList');
  if (!entries.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="3.5" y="3.5" width="13" height="13" rx="2" stroke="#71717A" stroke-width="1.5"/>
            <path d="M7 10h6M7 7h3M7 13h4" stroke="#71717A" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">Nenhuma importação ainda</p>
        <p class="empty-sub">Após importar pedidos eles aparecerão aqui.</p>
      </div>`;
    return;
  }

  el.innerHTML = entries.map(e => {
    const isOk = e.status === 'success';
    const dt = e.imported_at ? fmtDatetime(e.imported_at) : '—';
    const orderInfo = [
      e.order_number ? `Pedido ${esc(e.order_number)}` : null,
      e.customer ? esc(e.customer) : null,
    ].filter(Boolean).join(' &middot; ');

    const links = isOk ? (e.output_files || []).map(f => `
      <a class="result-file-link"
         href="/api/download?path=${encodeURIComponent(f.path)}"
         download="${esc(f.name)}">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 11h9M6.5 2v6M6.5 8L4.5 6M6.5 8l2-2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        ${esc(f.name)}
      </a>`).join('') : '';

    const errorMsg = !isOk && e.error
      ? `<div class="log-error-msg">${esc(e.error)}</div>`
      : '';

    return `
      <div class="log-card ${isOk ? 'ok' : 'err'}" id="log-${esc(e.id)}">
        <div class="log-head">
          <div class="log-info">
            <div class="log-filename">${esc(e.source_filename)}</div>
            <div class="log-sub">
              <span>${dt}</span>
              ${orderInfo ? `<span>${orderInfo}</span>` : ''}
            </div>
          </div>
          <div class="log-actions">
            <button class="btn btn-sm" onclick="doReimport('${escJs(e.source_filename)}', '${esc(e.id)}')"
                    id="reimport-${esc(e.id)}" title="Reimportar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M10 6A4 4 0 112 4.5M2 2v2.5H4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Reimportar
            </button>
          </div>
        </div>
        ${links ? `<div class="log-files">${links}</div>` : ''}
        ${errorMsg}
        <div class="reimport-result hidden" id="reimport-result-${esc(e.id)}"></div>
      </div>`;
  }).join('');
}

async function doReimport(filename, entryId) {
  const btn = document.getElementById('reimport-' + entryId);
  const resultEl = document.getElementById('reimport-result-' + entryId);
  btn.disabled = true;
  btn.innerHTML = '<div class="spin-dark"></div>';
  resultEl.classList.add('hidden');

  try {
    const data = await api('/api/reimport', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename }),
    });

    const links = (data.files || []).map(f => `
      <a class="result-file-link"
         href="/api/download?path=${encodeURIComponent(f.path)}"
         download="${esc(f.name)}">${esc(f.name)}</a>`).join('');

    resultEl.className = 'reimport-result ok';
    resultEl.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 6.5l3 3 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Reimportado com sucesso &middot; ${links}`;
    resultEl.classList.remove('hidden');

    loadImported();
  } catch (e) {
    resultEl.className = 'reimport-result err';
    resultEl.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg> ${esc(e.message)}`;
    resultEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M10 6A4 4 0 112 4.5M2 2v2.5H4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg> Reimportar`;
  }
}

/* ── Config modal ── */
document.getElementById('configBtn').addEventListener('click', () => {
  document.getElementById('cfgWatchDir').value = cfg.watchDir || '';
  document.getElementById('cfgOutputDir').value = cfg.outputDir || '';
  document.getElementById('cfgOverlay').classList.add('open');
});

function closeCfgModal() {
  document.getElementById('cfgOverlay').classList.remove('open');
}

document.getElementById('cfgOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cfgOverlay')) closeCfgModal();
});

async function saveConfig() {
  const watchDir  = document.getElementById('cfgWatchDir').value.trim();
  const outputDir = document.getElementById('cfgOutputDir').value.trim();
  if (!watchDir || !outputDir) return;
  try {
    const data = await api('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ watchDir, outputDir }),
    });
    cfg = data;
    document.getElementById('watchDirLabel').textContent = cfg.watchDir;
    closeCfgModal();
    loadPending();
    loadImported();
  } catch (e) {
    alert('Erro ao salvar: ' + e.message);
  }
}

/* ── Folder browser ── */
function openBrowse(target) {
  browseTarget = target;
  const currentVal = target === 'watchDir'
    ? document.getElementById('cfgWatchDir').value.trim()
    : document.getElementById('cfgOutputDir').value.trim();
  document.getElementById('browseOverlay').classList.add('open');
  loadBrowseDir(currentVal || '~');
}

function closeBrowse() {
  document.getElementById('browseOverlay').classList.remove('open');
}

document.getElementById('browseOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('browseOverlay')) closeBrowse();
});

function confirmBrowse() {
  if (browseCurrentPath) {
    if (browseTarget === 'watchDir') {
      document.getElementById('cfgWatchDir').value = browseCurrentPath;
    } else {
      document.getElementById('cfgOutputDir').value = browseCurrentPath;
    }
  }
  closeBrowse();
}

async function loadBrowseDir(path) {
  document.getElementById('browseBody').innerHTML =
    '<div style="padding:20px;text-align:center;color:var(--text-muted)">Carregando…</div>';
  try {
    const data = await api('/api/fs?path=' + encodeURIComponent(path));
    if (data.error) throw new Error(data.error);

    browseCurrentPath = data.current;
    document.getElementById('browsePath').textContent = data.current;
    document.getElementById('browseSelPath').textContent = data.current;

    let html = '';
    if (data.parent) {
      html += `<div class="dir-row up" onclick="loadBrowseDir('${escPath(data.parent)}')">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M7.5 9.5L3.5 6l4-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Voltar</span>
      </div>`;
    }
    if (!data.entries.length) {
      html += '<div style="padding:14px 12px;font-size:13px;color:var(--text-muted)">Nenhuma subpasta</div>';
    } else {
      html += data.entries.map(e => `
        <div class="dir-row" onclick="loadBrowseDir('${escPath(e.path)}')">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M1 3.5a1 1 0 011-1h2.5l1.5 2H11a1 1 0 011 1V10a1 1 0 01-1 1H2a1 1 0 01-1-1V3.5z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          </svg>
          ${esc(e.name)}
        </div>`).join('');
    }
    document.getElementById('browseBody').innerHTML = html;
  } catch (err) {
    document.getElementById('browseBody').innerHTML =
      `<div style="padding:14px 12px;font-size:13px;color:var(--error)">${esc(err.message)}</div>`;
  }
}

/* ── Utils ── */
async function api(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escPath(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function fmtDatetime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

init();
</script>
</body>
</html>
